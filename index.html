<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Almoço - IERN</title>
    <style>
        :root {
            --primary: #1a5e5e;
            --secondary: #edf2f7;
            --accent: #2c7a7b;
            --text: #2d3748;
            --warning-bg: #fffaf0;
            --date-bg: #ebf8ff;
            --danger: #e53e3e;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary); margin: 0 0 10px 0; }

        .data-alvo {
            text-align: center;
            background: var(--date-bg);
            color: #2b6cb0;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid #bee3f8;
        }

        .regras {
            background-color: var(--warning-bg);
            color: #744210;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-left: 5px solid #f6ad55;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }

        select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled { background-color: #cbd5e0; }

        .status-msg {
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }

        .error { background: #fff5f5; color: #c53030; }
        .success { background: #f0fff4; color: #2f855a; }

        .columns { display: flex; gap: 15px; margin-top: 25px; }
        .column { flex: 1; background: #f7fafc; padding: 15px; border-radius: 12px; min-height: 150px; }
        .column h3 { font-size: 1rem; text-align: center; color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }

        ul { list-style: none; padding: 0; }
        li {
            background: white;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }

        .btn-del {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.7rem;
            display: none; /* Escondido por padrão */
        }

        .adm-section {
            margin-top: 30px;
            text-align: center;
            border-top: 1px dashed #cbd5e0;
            padding-top: 15px;
        }

        .btn-adm {
            background: #718096;
            width: auto;
            padding: 8px 20px;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) { .columns { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <h2>IERN - Lista de Almoço</h2>
    <div id="dataExibicao" class="data-alvo"></div>

    <div class="regras">
        <strong>Inscrições:</strong><br>
        • Para amanhã: Após as 12h de hoje.<br>
        • Para hoje: Até as 08h da manhã.
    </div>
    
    <div id="statusArea" class="status-msg"></div>

    <div class="form-group">
        <label>Nome do Professor(a):</label>
        <select id="professorSelect">
            <option value="">-- Selecione seu nome --</option>
        </select>
    </div>

    <div class="form-group">
        <label>Horário Desejado:</label>
        <select id="horario">
            <option value="11:40">11:40 (1º Almoço)</option>
            <option value="12:20">12:20 (2º Almoço)</option>
        </select>
    </div>

    <button id="btnInscricao" onclick="registrar()">Confirmar Minha Presença</button>

    <div class="columns">
        <div class="column">
            <h3>🍽️ 11:40</h3>
            <ul id="lista1140"></ul>
        </div>
        <div class="column">
            <h3>🍽️ 12:20</h3>
            <ul id="lista1220"></ul>
        </div>
    </div>

    <div class="adm-section">
        <button class="btn-adm" id="toggleAdm" onclick="ativarModoAdm()">Acesso ADM</button>
    </div>
</div>

<script>
    const SENHA_ADM = "iern123"; // ALTERE SUA SENHA AQUI
    let modoAdmAtivo = false;

    const PROFESSORES = [
        "Acacio", "Aetius", "Ana Cristina", "Arthur", "Audra", "Bruna", 
        "Ana Carolina", "Clea", "Cléo", "Dayse", "Edson", "Eduardo", 
        "Elaine", "Felipe", "Francisco", "Helton", "Iésu", "Jéssica", 
        "Joás", "Josangela", "Miqueias", "Pietro", "Rejane", "Romênia", "Rogério", 
        "Rosivaldo", "Rusiella", "Sheila", "Sueilha", "Sumara", "Themine", 
        "Túllio", "Waltecia"
    ].sort((a, b) => a.localeCompare(b, 'pt-BR'));

    function popularSelect() {
        const select = document.getElementById('professorSelect');
        PROFESSORES.forEach(prof => {
            let opt = document.createElement('option');
            opt.value = prof;
            opt.textContent = prof;
            select.appendChild(opt);
        });
    }

    function obterDataAlvo() {
        const agora = new Date();
        const hora = agora.getHours();
        let dataAlvo = new Date();
        if (hora >= 12) dataAlvo.setDate(agora.getDate() + 1);
        return dataAlvo.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
    }

    function atualizarInterface() {
        const hora = new Date().getHours();
        const btn = document.getElementById('btnInscricao');
        const statusArea = document.getElementById('statusArea');
        document.getElementById('dataExibicao').innerHTML = `📅 Almoço de:<br><strong>${obterDataAlvo()}</strong>`;

        if (hora >= 8 && hora < 12) {
            btn.disabled = true;
            statusArea.textContent = "🔒 Inscrições encerradas.";
            statusArea.className = "status-msg error";
        } else {
            btn.disabled = false;
            statusArea.textContent = "✅ Sistema aberto.";
            statusArea.className = "status-msg success";
        }
        renderizarListas();
    }

    function registrar() {
        const nome = document.getElementById('professorSelect').value;
        const horario = document.getElementById('horario').value;
        if (!nome) { alert("Selecione seu nome."); return; }

        let inscritos = JSON.parse(localStorage.getItem('iern_almoco') || "[]");
        if (inscritos.some(p => p.nome === nome)) { alert("Você já está na lista!"); return; }

        inscritos.push({ nome, horario });
        localStorage.setItem('iern_almoco', JSON.stringify(inscritos));
        document.getElementById('professorSelect').value = "";
        renderizarListas();
    }

    function ativarModoAdm() {
        if (!modoAdmAtivo) {
            const senha = prompt("Digite a senha do administrador:");
            if (senha === SENHA_ADM) {
                modoAdmAtivo = true;
                document.getElementById('toggleAdm').textContent = "Sair do ADM";
                document.getElementById('toggleAdm').style.background = "#2d3748";
                renderizarListas();
            } else {
                alert("Senha incorreta!");
            }
        } else {
            modoAdmAtivo = false;
            document.getElementById('toggleAdm').textContent = "Acesso ADM";
            document.getElementById('toggleAdm').style.background = "#718096";
            renderizarListas();
        }
    }

    function removerProfessor(nome) {
        if (confirm(`Remover ${nome} da lista?`)) {
            let inscritos = JSON.parse(localStorage.getItem('iern_almoco') || "[]");
            inscritos = inscritos.filter(p => p.nome !== nome);
            localStorage.setItem('iern_almoco', JSON.stringify(inscritos));
            renderizarListas();
        }
    }

    function renderizarListas() {
        const inscritos = JSON.parse(localStorage.getItem('iern_almoco') || "[]");
        const lista1140 = document.getElementById('lista1140');
        const lista1220 = document.getElementById('lista1220');
        lista1140.innerHTML = "";
        lista1220.innerHTML = "";
        
        inscritos.sort((a, b) => a.nome.localeCompare(b, 'pt-BR'));

        inscritos.forEach(p => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${p.nome}</span> 
                           <button class="btn-del" style="display: ${modoAdmAtivo ? 'block' : 'none'}" 
                           onclick="removerProfessor('${p.nome}')">Excluir</button>`;
            (p.horario === "11:40" ? lista1140 : lista1220).appendChild(li);
        });
    }

    function checkReset() {
        const lastReset = localStorage.getItem('lastResetDate');
        const hoje = new Date().toDateString();
        if (lastReset !== hoje && new Date().getHours() >= 12) {
            localStorage.setItem('iern_almoco', "[]");
            localStorage.setItem('lastResetDate', hoje);
        }
    }

    popularSelect();
    checkReset();
    atualizarInterface();
    setInterval(atualizarInterface, 30000);
</script>
</body>
</html>
